<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Biblioteca Musical</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Ajustes para o admin */
        .admin-panel { max-width: 1000px; }
        .admin-panel table { font-size: 0.85rem; }
        .admin-panel th, .admin-panel td { padding: 8px 6px; }
        .admin-panel .btn-group { flex-wrap: wrap; }
        .admin-panel textarea {
            width: 100%;
            height: 150px;
            font-family: monospace;
            font-size: 0.9rem;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 6px;
            resize: vertical;
        }
        .admin-panel .import-section {
            background: #f8fafc;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid #e9edf2;
        }
        .admin-panel .import-section h3 {
            margin-top: 0;
            color: #1e2a3a;
        }
        .admin-panel .import-section .btn-group {
            margin-top: 10px;
        }
        .admin-panel .import-section .btn-import-lote {
            background: #4caf50;
            color: #fff;
        }
        .admin-panel .import-section .btn-import-lote:hover {
            background: #388e3c;
        }
        .feedback {
            margin-top: 10px;
            padding: 10px;
            border-radius: 6px;
            display: none;
        }
        .feedback.success { background: #d4edda; color: #155724; display: block; }
        .feedback.error { background: #f8d7da; color: #721c24; display: block; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>🎵 Admin</h2>
        <a href="index.html">🏠 Voltar</a>
        <a href="#" onclick="location.reload()" style="border-top:1px solid #3a4a5a; margin-top:20px; padding-top:20px;">🔄 Recarregar</a>
    </div>
    <div class="main">
        <div class="admin-panel">
            <h1>⚙️ Gerenciar Livros</h1>

            <!-- Seção de importação em lote -->
            <!-- Seção de importação em lote -->
<div class="import-section">
    <h3>📥 Importar em Lote</h3>
    <p>Cole abaixo os livros no formato: <strong>Número - Tipo - Instrumento - Autor - Título</strong></p>
    <textarea id="txtLote" placeholder="Exemplo:&#10;6945 - PDF - PIANO - John Thompson - Easiest Piano Course Part 6-1&#10;6946 - PDF - PIANO - John Thompson - Easiest Piano Course Part 6-2"></textarea>
    <div class="btn-group">
        <button id="btnImportarLote" class="btn-import-lote">📥 Importar Lote</button>
        <button id="btnLimparLote" class="btn-clear">🧹 Limpar</button>
        <button id="btnBaixarRelatorio" class="btn-import" style="display:none;">📄 Baixar Relatório TXT</button>
    </div>
    <div id="feedbackLote" class="feedback"></div>
    <div id="detalhesImportacao" style="margin-top:10px; background:#fff; padding:10px; border-radius:6px; border:1px solid #e9edf2; display:none;"></div>
</div>

          <!-- Formulário individual -->
<form id="formLivro">
    <label>Número *</label>
    <input type="text" id="txtNumero" placeholder="Ex: 6945" required>
    <label>Tipo *</label>
    <input type="text" id="txtTipo" placeholder="PDF, Livro, Artigo..." required>
    <label>Instrumento *</label>
    <input type="text" id="txtInstrumento" placeholder="PIANO, GUITARRA..." required>
    <label>Autor *</label>
    <input type="text" id="txtAutor" placeholder="Nome do autor" required>
    <label>Título *</label>
    <input type="text" id="txtTitulo" placeholder="Título do livro" required>
    <label>Arquivo PDF</label>
    <input type="text" id="txtArquivo" placeholder="pdf/6945.pdf">
</form>

<!-- Botões (fora do formulário, alinhados) -->
<div class="btn-group" style="display:flex; flex-wrap:wrap; gap:8px; margin-top:10px; margin-bottom:20px;">
    <button type="button" id="btnSalvar" class="btn-save">💾 Salvar</button>
    <button type="button" id="btnLimpar" class="btn-clear">🧹 Limpar</button>
    <button type="button" id="btnExportar" class="btn-export">📤 Exportar JSON</button>
    <button type="button" id="btnApagarTodos" class="btn-delete" style="background:#d32f2f;">🗑️ Apagar Todos</button>
    <button type="button" id="btnResetar" class="btn-clear" style="background:#ff9800; color:#fff;">🔄 Resetar Dados</button>
</div>
            <!-- Tabela de livros -->
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Nº</th><th>Tipo</th><th>Instrumento</th><th>Autor</th><th>Título</th><th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tabelaAdmin">
                        <tr><td colspan="6">Carregando...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Carrega os dados globais (dados.js) e o admin.js -->
    <script src="dados.js"></script>
    <script src="admin.js"></script>
</body>
</html>
